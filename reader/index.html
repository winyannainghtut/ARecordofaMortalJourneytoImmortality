<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="A modern, local markdown novel reader with bookmarks, reading progress, and customizable themes.">
  <title>Novel Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;500;700&family=Atkinson+Hyperlegible:wght@400;700&family=Noto+Sans+Myanmar:wght@400;500;700&family=Noto+Serif+Myanmar:wght@400;500;700&family=Outfit:wght@400;500;600;700&family=Padauk:wght@400;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
    rel="stylesheet">
  <link rel="manifest" href="./app-manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- Dynamic theme color for Safe Areas -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F2F2F7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <div class="app-shell" id="appShell">
    <!-- iOS Bottom Tab Bar -->
    <nav class="ios-tab-bar">
      <div class="ios-tab-bar-blur"></div>
      <div class="ios-tab-items">
        <button class="tab-btn" id="tabLibraryBtn" aria-label="Library">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M4 2v18H2V2h2zm18 0H8v18h14V2zm-4 14H10v-2h8v2zm0-4H10v-2h8v2zm0-4H10V6h8v2z" />
          </svg>
          <span>Library</span>
        </button>
        <button class="tab-btn active" id="tabReaderBtn" aria-label="Reader">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1z" />
          </svg>
          <span>Reader</span>
        </button>
        <button class="tab-btn bookmark-btn" id="bookmarkBtn" aria-label="Bookmark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z" />
          </svg>
          <span>Save</span>
        </button>
        <button class="tab-btn" id="tabSettingsBtn" aria-label="Settings">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
          </svg>
          <span>Settings</span>
        </button>
      </div>
    </nav>

    <!-- Reader Main View -->
    <main class="reader-view" id="readerPanel">
      <!-- Fixed iOS-style Header -->
      <header class="ios-header" id="readerHeader">
        <div class="ios-header-blur"></div>
        <div class="ios-header-content">
          <div class="header-left">
            <button class="ios-icon-btn" id="headerLibraryBtn" type="button" aria-label="Library">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M4 2v18H2V2h2zm18 0H8v18h14V2zm-4 14H10v-2h8v2zm0-4H10v-2h8v2zm0-4H10V6h8v2z" />
              </svg>
            </button>
            <button class="ios-icon-btn" id="prevBtn" type="button" aria-label="Previous chapter">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
          </div>

          <div class="header-titles">
            <h1 id="chapterTitle" class="truncate">Select a chapter</h1>
            <p id="chapterInfo" class="truncate meta-text">Library is loading...</p>
          </div>

          <div class="header-right">
            <button class="ios-icon-btn" id="nextBtn" type="button" aria-label="Next chapter">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
            <button class="ios-icon-btn" id="headerSettingsBtn" type="button" aria-label="Settings">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
              </svg>
            </button>
          </div>
        </div>
        <div class="reading-progress-bar" id="readingProgressBar"></div>
      </header>

      <article class="content" id="content">
        <div class="welcome-state">
          <div class="welcome-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
          </div>
          <p class="welcome-title">A Record of a Mortal's Journey</p>
          <p class="welcome-hint">Open the Library to browse chapters in English or Burmese.</p>
        </div>
      </article>

      <!-- iOS Bottom Safe Area padding spacer -->
      <div class="bottom-spacer"></div>

      <!-- Scroll to Top FAB -->
      <button class="fab-scroll-top" id="scrollTopBtn" aria-label="Scroll to top" hidden>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
    </main>

    <!-- Library Full-Screen Modal -->
    <aside class="ios-modal" id="libraryModal" aria-hidden="true">
      <div class="ios-modal-header">
        <div class="ios-modal-header-blur"></div>
        <div class="ios-modal-header-content">
          <h1>Library</h1>
          <button class="ios-text-btn cancel-btn" type="button" aria-label="Close library"
            data-close-modal="libraryModal">Done</button>
        </div>

        <div class="ios-search-bar">
          <div class="search-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="search-icon" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input id="searchInput" type="search" placeholder="Search Chapters...">
          </div>
        </div>

        <!-- iOS Segmented Control -->
        <div class="segmented-control-wrapper">
          <div class="segmented-control" id="sourceFilter"></div>
        </div>
      </div>

      <div class="ios-modal-content">
        <div class="ios-list" id="chapterList"></div>
      </div>
    </aside>

    <!-- Settings Full-Screen Modal -->
    <aside class="ios-modal" id="settingsModal" aria-hidden="true">
      <div class="ios-modal-header">
        <div class="ios-modal-header-blur"></div>
        <div class="ios-modal-header-content">
          <h1>Settings</h1>
          <button class="ios-text-btn cancel-btn" type="button" aria-label="Close settings"
            data-close-modal="settingsModal">Done</button>
        </div>
      </div>

      <div class="ios-modal-content bg-grouped">
        <div class="ios-form-group">

          <div class="ios-form-row">
            <label for="themeSelect">Theme</label>
            <select id="themeSelect" class="ios-select">
              <option value="system">Auto (System)</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
              <option value="amoled">Pure Black</option>
              <option value="sepia">Sepia</option>
              <option value="burmese-art">Burmese Art</option>
              <option value="night-blue">Night Blue</option>
            </select>
          </div>

          <div class="ios-form-row">
            <label for="fontSelect">Typeface</label>
            <select id="fontSelect" class="ios-select">
              <option value="serif">System Serif</option>
              <option value="friendly">System Rounded (Atkinson)</option>
              <option value="classic">Classic (Alegreya)</option>
              <option value="myanmarSystem">Myanmar Pyidaungsu</option>
              <option value="myanmarText">Myanmar Text</option>
              <option value="myanmarSerif">Noto Serif Myanmar</option>
              <option value="myanmarSans">Noto Sans Myanmar</option>
              <option value="myanmarPadauk">Padauk</option>
            </select>
          </div>

          <div class="ios-form-row">
            <div class="slider-block">
              <div class="slider-header">
                <label for="fontSizeRange">Font Size</label>
                <span id="fontSizeValue" class="value-badge"></span>
              </div>
              <input id="fontSizeRange" class="ios-slider" type="range" min="14" max="32" step="1">
            </div>
          </div>

          <div class="ios-form-row">
            <div class="slider-block">
              <div class="slider-header">
                <label for="lineHeightRange">Line Height</label>
                <span id="lineHeightValue" class="value-badge"></span>
              </div>
              <input id="lineHeightRange" class="ios-slider" type="range" min="1.35" max="2.2" step="0.05">
            </div>
          </div>

          <div class="ios-form-row">
            <div class="slider-block">
              <div class="slider-header">
                <label for="widthRange">Text Width</label>
                <span id="widthValue" class="value-badge"></span>
              </div>
              <input id="widthRange" class="ios-slider" type="range" min="560" max="1080" step="20">
            </div>
          </div>

        </div>

        <p class="settings-section-title">Reading Stats</p>
        <div class="stats-grid" id="statsGrid">
          <div class="stat-card">
            <div class="stat-value" id="statCompleted">—</div>
            <div class="stat-label">Done</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statInProgress">—</div>
            <div class="stat-label">Reading</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="statTotal">—</div>
            <div class="stat-label">Total</div>
          </div>
        </div>

        <div class="ios-form-group margin-top-large">
          <button class="ios-action-btn" id="downloadBtn" type="button">
            <span class="icon-wrap">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
            </span>
            Download Next 100 Episodes
          </button>
          <p class="form-hint">Downloads chapters ahead of your current position for offline reading.</p>
        </div>

      </div>
    </aside>



    <!-- Toast container for notifications / downloads -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
  <script src="./app.js"></script>
</body>

</html>
